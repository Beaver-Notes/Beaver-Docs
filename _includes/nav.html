{% include search.html %}
<nav class="bg-transparent border-b dark:border-neutral-700">
  <div class="mx-auto px-2 sm:px-6 lg:px-8">
    <div class="relative flex h-16 items-center justify-between">
      <div
        class="flex flex-1 items-center justify-between sm:items-stretch sm:justify-start"
      >
        <!-- Logo and Title -->
        <a href="{{ "/" | relative_url }}" class="flex shrink-0 items-center">
          <img
            class="h-8 w-auto"
            src="{{ site.baseurl }}/assets/img/logo.png"
          />
          <p class="ml-4 dark:text-gray-100 font-bold">Beaver Docs</p>
        </a>

        <!-- Search Icon Button -->
        <button
          onclick="openSearch()"
          class="p-2 rounded-lg hover:bg-amber-400 hover:bg-opacity-10 flex items-center justify-center ml-auto text-gray-600 dark:text-neutral-100 hover:text-amber-400"
        >
          <i
            class="ri-search-line"
          ></i>
        </button>

        <!-- Dark Mode Toggle Button -->
        <button
          id="dark-mode-toggle"
          class="p-2 rounded-lg hover:bg-amber-400 hover:bg-opacity-10 flex items-center justify-center ml-4 text-gray-600 dark:text-neutral-100 hover:text-amber-400"
          onclick="toggleDarkMode()"
        >
          <i
            id="dark-mode-icon"
            class="ri-moon-line"
          ></i>
        </button>
      </div>
    </div>
  </div>
</nav>  
<script>
  function setDarkMode(isDark) {
    const html = document.documentElement;
    const icon = document.getElementById("dark-mode-icon");

    if (isDark) {
      html.classList.add("dark");
      icon.classList.add("ri-sun-line");
      icon.classList.remove("ri-moon-line");
    } else {
      html.classList.remove("dark");
      icon.classList.add("ri-moon-line");
      icon.classList.remove("ri-sun-line");
    }
  }

  function toggleDarkMode() {
    const isDark = document.documentElement.classList.contains("dark");
    const newTheme = isDark ? "light" : "dark";
    localStorage.setItem("theme", newTheme);
    setDarkMode(!isDark);
  }

  // Apply theme on first load
  document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      setDarkMode(savedTheme === "dark");
    } else {
      // Use system preference if no saved theme
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      setDarkMode(prefersDark);
    }
  });

  function openSearch() {
    const searchContainer = document.getElementById("search-container");
    if (searchContainer) {
      searchContainer.classList.remove("hidden");
    }
  }

  document.addEventListener("keydown", (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
      event.preventDefault();
      openSearch();
    }
  });
</script>
